apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      initContainers:
        # Wait for Postgres port to respond before starting Flask backend
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres-svc 5432; do echo 'Waiting for Postgres...'; sleep 2; done;"
      containers:
        - name: backend
          image: <your-docker-hub-username>/todo-backend:v2
          ports:
            - containerPort: 3000
          envFrom:
          - configMapRef:
            name: todo-app-config
          env:
          # Pull password securely from Secret
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD
